<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PackMaster V48.12 Ultimate (The Print Perfect)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Noto Sans Thai"', 'sans-serif'] } } } }
  </script>
  <style>
    @media print { 
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      @page { size: 100mm 150mm; margin: 0; } 
      body { background: white !important; } 
      .print-area { display: block !important; }
      .no-print { display: none !important; }
      
      .label-overlay {
        background-color: #ffffff !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        border: 4px dashed #172554 !important;
      }
      .label-overlay-text {
        text-shadow: none !important;
        color: #172554 !important;
      }
    }
    body { font-family: 'Noto Sans Thai', sans-serif; }
  </style>
</head>
<body class="bg-[#f8fafc] text-blue-950 selection:bg-blue-200">
  <div id="root"></div>

  <script type="text/babel">
    if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    const { useState, useEffect, useCallback, useMemo } = React;

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => { const timer = setTimeout(() => onClose(), 3000); return () => clearTimeout(timer); }, [onClose]);
      return (
        <div className={`fixed top-6 right-6 z-[99999] flex items-center gap-3 px-5 py-3.5 rounded-2xl shadow-xl border animate-in slide-in-from-right-8 duration-300 ${type === 'success' ? 'bg-white border-green-100 text-green-700' : 'bg-white border-red-100 text-red-600'}`}>
          <span className="text-xl">{type === 'success' ? '✅' : '❌'}</span>
          <span className="font-bold text-sm tracking-wide">{message}</span>
        </div>
      );
    };

    const LabelCard = ({ order, isExport = false, thermalMode = true }) => {
      const [displayImg, setDisplayImg] = useState(order.pdfImage);

      useEffect(() => {
        if (!order || !order.pdfImage) return;
        if (!thermalMode) {
          setDisplayImg(order.pdfImage);
          return;
        }
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          const cvs = document.createElement('canvas');
          cvs.width = img.width;
          cvs.height = img.height;
          const ctx = cvs.getContext('2d');
          ctx.filter = 'grayscale(100%) brightness(80%) contrast(200%)';
          ctx.drawImage(img, 0, 0);
          setDisplayImg(cvs.toDataURL('image/jpeg', 0.9));
        };
        img.src = order.pdfImage;
      }, [order.pdfImage, thermalMode]);

      if (!order || !order.pdfImage) return null;
      
      const itemCount = order.displayItems ? order.displayItems.length : 0;
      let maxLen = itemCount > 0 ? Math.max(...order.displayItems.map(t => t.length), 0) : 0;
      
      let fontSize = '42pt';
      let lineHeight = 1.2;
      
      if (itemCount === 1) {
          fontSize = maxLen > 20 ? '18pt' : maxLen > 12 ? '24pt' : maxLen > 8 ? '32pt' : '40pt';
          lineHeight = 1.1;
      } else if (itemCount === 2) {
          fontSize = maxLen > 22 ? '13pt' : maxLen > 15 ? '16pt' : maxLen > 10 ? '20pt' : '22pt';
          lineHeight = 1.1;
      } else if (itemCount === 3) {
          fontSize = maxLen > 20 ? '11pt' : '13pt'; 
          lineHeight = 1.1;
      } else {
          fontSize = '10pt'; 
          lineHeight = 1.0;
      }

      return (
        <div className={`shrink-0 box-border ${isExport ? '' : 'border-2 border-blue-50 shadow-xl shadow-blue-900/5 rounded-2xl'}`} style={{ width: '100mm', height: '150mm', backgroundColor: '#ffffff', position: 'relative', overflow: 'hidden', pageBreakAfter: 'always', margin: 0, display: 'block', isolation: 'isolate' }}>
          <img src={displayImg} alt="Label Base" style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', objectFit: 'fill', zIndex: 0 }} />
          
          {order.displayItems && order.displayItems.length > 0 && (
            <div className="label-overlay" style={{ position: 'absolute', zIndex: 10, boxSizing: 'border-box', bottom: '24px', left: '16px', right: '16px', height: '18%', border: '4px dashed #172554', borderRadius: '14px', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '8px', gap: '4px', backgroundColor: 'rgba(255,255,255,0.90)', backdropFilter: 'blur(2px)', overflow: 'hidden' }}>
              {order.displayItems.map((text, idx) => (
                <p key={idx} className="label-overlay-text" style={{ fontFamily: '"Noto Sans Thai", sans-serif', fontWeight: 800, color: '#172554', lineHeight: lineHeight, margin: 0, textAlign: 'center', wordBreak: 'break-word', width: '100%', letterSpacing: '-0.02em', fontSize: fontSize, textShadow: '3px 3px 0 #fff, -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff, 0 3px 0 #fff, 0 -3px 0 #fff, 3px 0 0 #fff, -3px 0 0 #fff, 2px 4px 8px rgba(23, 37, 84, 0.15)' }}>
                  {text}
                </p>
              ))}
            </div>
          )}
        </div>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('upload');
      const [orders, setOrders] = useState([]);
      const [skuRules, setSkuRules] = useState(() => {
        try { const saved = localStorage.getItem('skuMappingRules'); if (saved) return JSON.parse(saved); } catch (e) {} return [];
      });
      const [newRule, setNewRule] = useState({ keyword: '', shortName: '' });
      const [editingId, setEditingId] = useState(null); 
      
      const [uploadError, setUploadError] = useState('');
      const [loadingStatus, setLoadingStatus] = useState({ active: false, current: 0, total: 0 });
      const [exportStatus, setExportStatus] = useState({ active: false, current: 0, total: 0 });
      const [previewMode, setPreviewMode] = useState('table');
      const [testInput, setTestInput] = useState('');
      const [testQty, setTestQty] = useState('1');
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

      const [thermalMode, setThermalMode] = useState(() => {
        try { const saved = localStorage.getItem('thermalMode'); if (saved !== null) return JSON.parse(saved); } catch (e) {} return true;
      });

      useEffect(() => { localStorage.setItem('skuMappingRules', JSON.stringify(skuRules)); }, [skuRules]);
      useEffect(() => { localStorage.setItem('thermalMode', JSON.stringify(thermalMode)); }, [thermalMode]);

      const showToast = (message, type = 'success') => setToast({ show: true, message, type });

      // 🔥 THE CLEAN SLATE MATCHER: อิงแค่ตัวเลข และอังกฤษล้วน ตัดภาษาไทยทิ้ง 100%
      const getMatchedRule = useCallback((textToSearch) => {
        if (!textToSearch) return null;

        // สับข้อความทิ้งทุกอย่างที่ไม่ใช่ภาษาอังกฤษและตัวเลข
        const tokenize = (str) => {
            let cleaned = String(str).toLowerCase()
                .replace(/[^a-z0-9\s]/g, ' ') // โยนภาษาไทย, วงเล็บ, สัญลักษณ์ทิ้งทั้งหมด!
                .replace(/\bx\b/g, ' ')       // ถอนรากถอนโคนตัว 'x' เผื่อบิลไม่พิมพ์มา (LAVENDER X 3 จะเหลือ lavender 3)
                .replace(/\s+/g, ' ')
                .trim();
            return cleaned.split(' ').filter(w => w.length > 0);
        };

        const textWords = tokenize(textToSearch);
        if (textWords.length === 0) return null;

        const rules = skuRules.map(r => ({
            ...r,
            wordArray: tokenize(r.keyword)
        })).filter(r => r.wordArray.length > 0);

        // จัดเรียงกฎ: กฎที่ความยาวดั้งเดิมยาวกว่า ต้องถูกตรวจก่อนเสมอ (กันตัวสั้นมาแย่งซีน)
        rules.sort((a, b) => {
            if (b.wordArray.length !== a.wordArray.length) {
                return b.wordArray.length - a.wordArray.length;
            }
            return b.keyword.length - a.keyword.length;
        });

        // จับคู่แบบหยิบออกจากตะกร้า
        for (const rule of rules) {
            let tempTextWords = [...textWords];
            let allMatch = true;

            for (const rw of rule.wordArray) {
                const idx = tempTextWords.indexOf(rw);
                if (idx !== -1) {
                    tempTextWords.splice(idx, 1); // หยิบออกไป ไม่ให้นับซ้ำ (แก้ปัญหา 5แถม5)
                } else {
                    allMatch = false; // หาคำนี้ไม่เจอ ปัดตกทันที!
                    break;
                }
            }
            
            // เจอครบทุกคำปุ๊บ คือใช่เลย!
            if (allMatch) return rule;
        }

        return null;
      }, [skuRules]);

      const handleFileUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        if (orders.length >= 150) {
            showToast('อัลบั้มเต็มแล้ว! (สูงสุด 150 ใบ) กรุณาล้างข้อมูลก่อนอัปโหลดใหม่', 'error');
            e.target.value = null;
            return;
        }

        setLoadingStatus({ active: true, current: 0, total: 'เช็คจำนวนหน้า...' });
        setUploadError(''); 

        try {
          const pdfjs = window.pdfjsLib;
          if (!pdfjs) throw new Error("โหลดระบบอ่าน PDF ไม่สำเร็จ กรุณารีเฟรชหน้าเว็บ");

          let totalNewPages = 0;
          let pdfDocuments = [];
          
          for (const file of files) {
            if (!file.name.toLowerCase().endsWith('.pdf')) continue;
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjs.getDocument({ data: arrayBuffer }).promise;
            totalNewPages += pdf.numPages;
            pdfDocuments.push({ file, pdf });
          }

          if (totalNewPages === 0) {
              setUploadError('ไม่พบไฟล์ PDF ที่รองรับ กรุณาตรวจไฟล์อีกครั้งค่ะ');
              showToast('ไม่มีไฟล์ PDF', 'error');
              setLoadingStatus({ active: false, current: 0, total: 0 });
              e.target.value = null;
              return;
          }

          if (orders.length + totalNewPages > 150) {
              const overAmount = (orders.length + totalNewPages) - 150;
              showToast(`อัปโหลดไม่ได้! รวมแล้วเกิน 150 ใบ (เกินมา ${overAmount} ใบ)`, 'error');
              setLoadingStatus({ active: false, current: 0, total: 0 });
              e.target.value = null;
              return;
          }

          let allNewOrders = [];
          let currentPageCount = 0;
          
          for (const { pdf } of pdfDocuments) {
            for (let i = 1; i <= pdf.numPages; i++) {
              currentPageCount++;
              setLoadingStatus(prev => ({ ...prev, current: currentPageCount, total: totalNewPages }));
              
              const page = await pdf.getPage(i);
              const textContent = await page.getTextContent();
              const fullText = textContent.items.map(item => item.str).join(' ');

              const viewport = page.getViewport({ scale: 2.5 }); 
              const canvas = document.createElement('canvas');
              const context = canvas.getContext('2d');
              canvas.height = viewport.height; canvas.width = viewport.width;
              await page.render({ canvasContext: context, viewport }).promise;
              const pdfImage = canvas.toDataURL('image/jpeg', 0.9);

              let platform = 'SHOPEE';
              if (fullText.match(/Order\s*ID/i) || fullText.match(/In\s*transit/i) || fullText.match(/TikTok/i)) platform = 'TIKTOK';

              let zone = fullText;

              const tableStartRegex = /(?:ชื่[\s\u200B]*อ[\s\u200B]*สิ[\s\u200B]*น[\s\u200B]*ค้[\s\u200B]*า|P[\s\u200B]*r[\s\u200B]*o[\s\u200B]*d[\s\u200B]*u[\s\u200B]*c[\s\u200B]*t|#\s*ชื่[\s\u200B]*อ)/i;
              const tableStartMatch = zone.match(tableStartRegex);
              
              if (tableStartMatch) {
                  zone = zone.substring(tableStartMatch.index);
                  zone = zone.replace(/(?:ชื่[\s\u200B]*อ[\s\u200B]*สิ[\s\u200B]*น[\s\u200B]*ค้[\s\u200B]*า|P[\s\u200B]*r[\s\u200B]*o[\s\u200B]*d[\s\u200B]*u[\s\u200B]*c[\s\u200B]*t[\s\u200B]*N[\s\u200B]*a[\s\u200B]*m[\s\u200B]*e|#\s*ชื่[\s\u200B]*อ)/gi, '');
                  zone = zone.replace(/(?:ตั[\s\u200B]*ว[\s\u200B]*เ[\s\u200B]*ลื[\s\u200B]*อ[\s\u200B]*ก|จ[\s\u200B]*[ำํา]+[\s\u200B]*น[\s\u200B]*ว[\s\u200B]*น|S[\s\u200B]*K[\s\u200B]*U|S[\s\u200B]*e[\s\u200B]*l[\s\u200B]*l[\s\u200B]*e[\s\u200B]*r|Q[\s\u200B]*t[\s\u200B]*y)/gi, '');
                  
                  const footerRegex = /(?:[Ss]hopee\s*Order|[Oo]rder\s*No|[Pp]rint\s*Date|[Pp]age\s*\d|[Pp]owered\s*by|ผู้รับ\s*\(TO\)|[Tt]ikTok\s*Shop|[Oo]rder\s*ID|[Qq]ty\s*Total|[Hh]opee|[Rr]der\s*No|[Rr]int\s*Date|[Aa]ge\s*\d|[Oo]wered|[Ii]kTok)/i;
                  const footerMatch = zone.match(footerRegex);
                  if (footerMatch) {
                      zone = zone.substring(0, footerMatch.index);
                  }
              }
              
              zone = zone.replace(/(?:ไม่ต้องเก็บเงิน|เก็บเงินปลายทาง|PICK[\s-]*UP|NDD|HOME|OFFICE|ROS|SUB|CON|LGN|DROP|Bulky)/gi, '');
              zone = zone.replace(/\b[A-Z0-9]{1,4}-\([A-Z0-9.]+\)/gi, ''); 
              zone = zone.replace(/\b[A-Z]+-[A-Z]\s+-\s+[ก-๙]+\b/gi, ''); 
              zone = zone.replace(/\b[A-Z0-9]+_[0-9]+_[A-Z0-9]+_[A-Z0-9-]+\b/gi, ''); 

              zone = zone.replace(/\b[A-Z]\d\s+[A-Z0-9]+-\d+\b/gi, ''); 
              zone = zone.replace(/\b[A-Z]\d-\([A-Z0-9.]+\)\b/gi, ''); 
              zone = zone.replace(/\b\d{3}[A-Z]\b/gi, ''); 
              zone = zone.replace(/\b\d{5}\b/g, ''); 
              zone = zone.replace(/\b0\d{8,9}\b/g, ''); 
              zone = zone.replace(/\b\d{6}[A-Z0-9]{5,}\b/gi, ''); 
              zone = zone.replace(/\b(?:TH|JT|SPX)[A-Z0-9]+\b/gi, '');
              zone = zone.replace(/\b\d{12,}\b/g, ''); 
              zone = zone.replace(/(?:บ้านเลขที่|เลขที่|หมู่ที่|หมู่|ม\.|ซอย|ซ\.|ถนน|ถ\.)\s*\d+[\/\d]*/g, '');
              zone = zone.replace(/\d{1,2}[-\/]\d{1,2}[-\/]\d{2,4}/g, ''); 
              zone = zone.replace(/\d{1,2}:\d{2}/g, ''); 
              zone = zone.replace(/In\s*transit\s*by[\s:]*[\d\/:\s]+/gi, '');
              zone = zone.replace(/Qty\s*Total[\s:]*\d+/gi, '');
              zone = zone.replace(/Total\s*Qty[\s:]*\d+/gi, '');
              zone = zone.replace(/(?:TikTok\s*Shop|Shopee)/gi, '');

              let parsedItems = [];

              if (platform === 'SHOPEE') {
                  let remainingText = zone.trim();
                  let currentItemNum = 1;
                  
                  while (remainingText.length > 0 && currentItemNum < 20) {
                      let prefixRegexStr = `(?:^|\\s)${currentItemNum}(?:\\s*[.)\\]]\\s*|\\s+|(?=\\(|\\[))`;
                      let currentPrefixRegex = new RegExp(prefixRegexStr);
                      let currentMatch = remainingText.match(currentPrefixRegex);
                      
                      if (!currentMatch) break; 
                      
                      let nextPrefixRegex = new RegExp(`(?:^|\\s)${currentItemNum + 1}(?:\\s*[.)\\]]\\s*|\\s+|(?=\\(|\\[))`); 
                      let nextMatch = remainingText.match(nextPrefixRegex);
                      
                      if (nextMatch) {
                          let textAfterNext = remainingText.substring(nextMatch.index + nextMatch[0].length).trim();
                          let cleanAfter = textAfterNext.replace(/(?:ไม่ต้องเก็บเงิน|เก็บเงินปลายทาง|PICK[\s-]*UP|NDD|HOME|OFFICE|ROS)/gi, '').replace(/\b[A-Z0-9_-]+\b/gi, '').trim();
                          if (!/[a-zA-Zก-๙]/.test(cleanAfter) || cleanAfter.length < 5) {
                              nextMatch = null; 
                          }
                      }

                      let itemStr = '';
                      if (nextMatch) {
                          itemStr = remainingText.substring(currentMatch.index + currentMatch[0].length, nextMatch.index);
                          remainingText = remainingText.substring(nextMatch.index);
                      } else {
                          itemStr = remainingText.substring(currentMatch.index + currentMatch[0].length);
                          remainingText = '';
                      }
                      
                      let textWithoutQty = itemStr.replace(/[\u200B-\u200F\uFEFF\xA0]/g, ' ').trim();
                      textWithoutQty = textWithoutQty.replace(/^\s*\d+([.)\]]|\s+)(?=[^\d]|$)/, '').trim();

                      let itemQty = 1;
                      // ดึงยอด QTY แบบปลอดภัย (ป้องกันการรวมเลข 1 กับ 2 เป็น 12)
                      let safeEndMatch = textWithoutQty.match(/\s+(\d{1,3})\s*(?:หมายเหตุ|PICKUP|[Nn][Ss]|[-_]+)?\s*$/i);
                      if (safeEndMatch) {
                          itemQty = parseInt(safeEndMatch[1], 10);
                          textWithoutQty = textWithoutQty.substring(0, safeEndMatch.index).trim();
                      }
                      
                      parsedItems.push({ text: textWithoutQty, qty: itemQty });
                      currentItemNum++;
                  }
              }

              if (parsedItems.length === 0) {
                  let itemStr = zone.trim();
                  let textWithoutQty = itemStr.replace(/[\u200B-\u200F\uFEFF\xA0]/g, ' ').trim();
                  textWithoutQty = textWithoutQty.replace(/^\s*\d+([.)\]]|\s+)(?=[^\d]|$)/, '').trim();
                  
                  let itemQty = 1;
                  let safeEndMatch = textWithoutQty.match(/\s+(\d{1,3})\s*(?:หมายเหตุ|PICKUP|[Nn][Ss]|[-_]+)?\s*$/i);
                  if (safeEndMatch) {
                      itemQty = parseInt(safeEndMatch[1], 10);
                      textWithoutQty = textWithoutQty.substring(0, safeEndMatch.index).trim();
                  }
                  
                  parsedItems.push({ text: textWithoutQty, qty: itemQty });
              }

              if (parsedItems.length === 1 && platform !== 'TIKTOK') {
                  const cleanForQty = fullText.replace(/[\s\u200B-\u200D\uFEFF]/g, '').replace(/\u0E4D\u0E32/g, '\u0E33').toLowerCase();
                  const explicitMatch = cleanForQty.match(/(?:จ[ำํา]นวนรวม|qtytotal|totalqty|ยอดรวม)[\:]?(\d{1,4})(?![\d])/);
                  if (explicitMatch) {
                      parsedItems[0].qty = parseInt(explicitMatch[1], 10);
                  }
              }

              const trackingMatch = fullText.match(/(TH\d{10,}|JT\d{10,}|SPX[A-Z0-9]+|KER[A-Z0-9]+|KA[A-Z0-9]+|66\d{10,}|82\d{10,}|\b\d{12}\b)/i);
              
              let currentOrderId = null;
              let orderMatch = fullText.match(/(?:Shopee\s*Order\s*No\.?|Order\s*ID)[\s:]*([A-Z0-9]+)/i);
              if (orderMatch) {
                  currentOrderId = orderMatch[1];
              }

              if (currentOrderId) {
                  let existingOrder = allNewOrders.find(o => o.orderId === currentOrderId && !o.isContinuation);
                  if (existingOrder) {
                      if (parsedItems.length > 0) {
                          existingOrder.parsedItems.push(...parsedItems);
                      }
                      
                      if (!existingOrder.tracking || existingOrder.tracking.startsWith('PAGE-')) {
                          existingOrder.tracking = trackingMatch ? trackingMatch[0] : existingOrder.tracking;
                      }

                      allNewOrders.push({ 
                          id: `label-${Date.now()}-${allNewOrders.length}-${i}`, 
                          tracking: trackingMatch ? trackingMatch[0] : existingOrder.tracking, 
                          parsedItems: [], 
                          pdfImage, 
                          platform,
                          orderId: currentOrderId,
                          isContinuation: true 
                      });
                      continue; 
                  }
              }

              allNewOrders.push({ 
                  id: `label-${Date.now()}-${allNewOrders.length}-${i}`, 
                  tracking: trackingMatch ? trackingMatch[0] : `PAGE-${i}`, 
                  parsedItems: parsedItems, 
                  pdfImage, 
                  platform,
                  orderId: currentOrderId 
              });
            }
          }
          
          if (allNewOrders.length > 0) {
            setOrders(prev => [...prev, ...allNewOrders]); 
            setActiveTab('preview');
            showToast(`เพิ่มข้อมูลสำเร็จ ${allNewOrders.length} ใบ`, 'success');
          }
        } catch (err) {
          console.error(err);
          let errMsg = err.message || err.toString();
          setUploadError(`ระบบขัดข้อง: ${errMsg}`);
          showToast('อ่านไฟล์ไม่สำเร็จ', 'error');
        } finally {
          setLoadingStatus({ active: false, current: 0, total: 0 });
        }
        
        e.target.value = null; 
      };

      const MappedOrders = useMemo(() => orders.map(o => {
        if (o.parsedItems.length === 0) {
            return { ...o, displayItems: [], originalQty: 0 };
        }

        let skuMap = new Map(); 
        let hasUnmatched = false;

        o.parsedItems.forEach(item => {
            const rule = getMatchedRule(item.text); 
            if (rule) {
                const baseName = rule.shortName.trim().replace(/\u00A0/g, ' ');
                const currentQty = skuMap.get(baseName) || 0;
                skuMap.set(baseName, currentQty + item.qty); 
            } else {
                hasUnmatched = true;
            }
        });

        let finalDisplayItems = [];
        
        skuMap.forEach((qty, baseName) => {
            let displayName = baseName;
            if (qty > 1) {
                if (/\d/.test(baseName)) {
                    displayName = baseName.replace(/\d+/g, (num) => parseInt(num, 10) * qty);
                } else {
                    displayName = `${baseName} x${qty}`;
                }
            }
            finalDisplayItems.push(`• ${displayName}`); 
        });

        if (finalDisplayItems.length === 0) {
            finalDisplayItems.push('ยังไม่ตั้งชื่อ (เพิ่มกฎ SKU)');
        } else if (hasUnmatched) {
            finalDisplayItems.push('• ยังไม่ตั้งชื่อ');
        }

        if (finalDisplayItems.length === 1 && finalDisplayItems[0].startsWith('• ')) {
            finalDisplayItems[0] = finalDisplayItems[0].substring(2);
        }

        const totalQty = o.parsedItems.reduce((sum, item) => sum + item.qty, 0);

        return { ...o, displayItems: finalDisplayItems, originalQty: totalQty };
      }), [orders, getMatchedRule]);

      const handleExportPDF = async () => {
        if (MappedOrders.length === 0) return;
        setExportStatus({ active: true, current: 0, total: MappedOrders.length });
        
        await new Promise(resolve => setTimeout(resolve, 800));

        try {
          const pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: [100, 150] });
          for (let i = 0; i < MappedOrders.length; i++) {
            setExportStatus(prev => ({ ...prev, current: i + 1 }));
            const element = document.getElementById(`render-target-${MappedOrders[i].id}`);
            if (element) {
              const canvas = await window.html2canvas(element, { scale: 3, useCORS: true, logging: false, backgroundColor: '#ffffff' });
              if (i > 0) pdf.addPage();
              pdf.addImage(canvas.toDataURL('image/jpeg', 0.98), 'JPEG', 0, 0, 100, 150);
            }
          }
          pdf.save(`PackMaster_Labels_${new Date().getTime()}.pdf`);
          showToast('ดาวน์โหลด PDF เรียบร้อย', 'success');
        } catch (err) {
          showToast('สร้างไฟล์ PDF ล้มเหลว', 'error');
        } finally {
          setExportStatus({ active: false, current: 0, total: 0 });
        }
      };

      const handleExportRules = () => {
        if (skuRules.length === 0) return showToast('ไม่มีข้อมูลให้ส่งออก', 'error');
        const blob = new Blob([JSON.stringify(skuRules, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const dlAnchorElem = document.createElement('a');
        dlAnchorElem.href = url;
        dlAnchorElem.download = `packmaster_rules_${new Date().toISOString().split('T')[0]}.json`;
        dlAnchorElem.click();
        URL.revokeObjectURL(url);
        showToast('สำรองข้อมูลสำเร็จ', 'success');
      };

      const handleImportRules = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedRules = JSON.parse(event.target.result);
            if (Array.isArray(importedRules)) {
              setSkuRules(prev => {
                const merged = [...importedRules, ...prev];
                return Array.from(new Map(merged.map(item => [item.keyword, item])).values());
              });
              showToast(`นำเข้าสำเร็จ ${importedRules.length} ข้อ`, 'success');
            } else showToast('รูปแบบไฟล์ไม่ถูกต้อง', 'error');
          } catch (err) { showToast('ไฟล์เสียหาย', 'error'); }
        };
        reader.readAsText(file); e.target.value = null;
      };

      const handleSubmitRule = (e) => {
        e.preventDefault(); 
        if (!newRule.keyword.trim() || !newRule.shortName.trim()) return;
        
        if (editingId) {
            setSkuRules(prev => prev.map(r => r.id === editingId ? { ...newRule, id: editingId } : r));
            setEditingId(null);
            showToast('แก้ไขกฎสำเร็จ', 'success');
        } else {
            setSkuRules([{ ...newRule, id: Date.now() }, ...skuRules]);
            showToast('เพิ่มกฎใหม่สำเร็จ', 'success');
        }
        setNewRule({ keyword: '', shortName: '' });
      };

      const handleEditClick = (rule) => {
        setNewRule({ keyword: rule.keyword, shortName: rule.shortName });
        setEditingId(rule.id);
      };

      const cancelEdit = () => {
        setNewRule({ keyword: '', shortName: '' });
        setEditingId(null);
      };

      const testResult = useMemo(() => {
        if (!testInput) return null;
        const rule = getMatchedRule(testInput);
        const totalQty = parseInt(testQty, 10) || 1;
        
        if (!rule) return 'ไม่พบคีย์เวิร์ด';
        
        const baseName = rule.shortName.trim().replace(/\u00A0/g, ' ');
        if (totalQty > 1) {
            if (/\d/.test(baseName)) {
                return baseName.replace(/\d+/g, (num) => parseInt(num, 10) * totalQty);
            }
            return `${baseName} x${totalQty}`;
        }
        return baseName;
      }, [testInput, testQty, getMatchedRule]);

      return (
        <div className="min-h-screen bg-[#f8fafc] text-blue-950 font-sans relative">

                    <div className="w-full bg-blue-50 rounded-full h-2.5 overflow-hidden"><div className="bg-blue-900 h-full transition-all duration-300 rounded-full" style={{ width: `${(exportStatus.current / exportStatus.total) * 100}%` }}></div></div>

                <div><h1 className="font-black text-2xl tracking-tight text-blue-950 leading-none">PackMaster</h1><div className="mt-1.5"><span className="text-[9px] font-black text-blue-500 uppercase tracking-widest bg-blue-50 px-2 py-0.5 rounded-md">Navy Minimal</span></div></div>

                  <div className="mb-10 text-center"><h2 className="text-4xl font-black text-blue-950 mb-4 tracking-tight">จัดเตรียมใบปะหน้า</h2><p className="text-blue-950/60 text-lg font-medium">แปลงใบแพ็คของจาก Shopee และ TikTok ให้อ่านง่ายในคลิกเดียว</p></div>

                        <div className="w-24 h-24 bg-blue-50/80 rounded-3xl flex items-center justify-center mx-auto mb-8 border border-blue-100/50 text-4xl shadow-sm">☁️</div>

                        <div className="flex-1 w-full"><label className="block text-[11px] font-black text-blue-950/50 mb-3 uppercase tracking-widest pl-2">2. ชื่อย่อที่ต้องการ (1 ชิ้น)</label><input type="text" value={newRule.shortName} onChange={(e) => setNewRule({...newRule, shortName: e.target.value})} placeholder="เช่น เด้งม่วง 10" className="w-full border-2 border-blue-100 bg-white px-6 py-4 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-900 outline-none transition-all text-base font-bold text-blue-950" /></div>
                        <div className="flex gap-2">
                            <button type="submit" disabled={!newRule.keyword || !newRule.shortName} className={`${editingId ? 'bg-blue-600 hover:bg-blue-700 shadow-blue-600/20' : 'bg-blue-950 hover:bg-blue-900 shadow-blue-900/20'} disabled:opacity-50 text-white px-8 py-4 rounded-2xl font-bold transition-all shadow-lg h-[60px] flex items-center gap-2 active:scale-95`}><span>{editingId ? '💾' : '➕'}</span> {editingId ? 'บันทึก' : 'เพิ่ม'}</button>
                            {editingId && <button type="button" onClick={cancelEdit} className="bg-white border-2 border-blue-100 text-blue-900 hover:bg-blue-50 px-5 py-4 rounded-2xl font-bold transition-all h-[60px] flex items-center gap-2 active:scale-95">ยกเลิก</button>}
                        </div>
                      </form>
                    </div>
                    <div className="max-h-[400px] overflow-y-auto">
                        <table className="w-full text-left">
                        <thead><tr className="text-blue-950/40 text-[10px] font-black uppercase tracking-widest bg-blue-50/30 border-b-2 border-blue-50"><th className="px-10 py-5">No.</th><th className="px-10 py-5">Keyword</th><th className="px-10 py-5">Base SKU</th><th className="px-10 py-5 text-right"></th></tr></thead>
                        <tbody className="divide-y-2 divide-blue-50/50">{skuRules.map((rule, idx) => (<tr key={rule.id} className={`bg-white hover:bg-blue-50/40 transition-colors group ${editingId === rule.id ? 'opacity-30' : ''}`}><td className="px-10 py-5 text-sm font-black text-blue-950/30">{idx + 1}</td><td className="px-10 py-5 font-mono text-[15px] font-bold text-blue-950/80">{rule.keyword}</td><td className="px-10 py-5"><span className="text-blue-900 font-black text-[15px] bg-blue-100/50 border border-blue-200/50 px-4 py-1.5 rounded-xl">{rule.shortName}</span></td><td className="px-10 py-5 text-right flex justify-end gap-2"><button onClick={() => handleEditClick(rule)} className="text-blue-950/30 hover:text-blue-600 hover:bg-blue-50 p-2.5 rounded-xl transition-all"><span>✏️</span></button><button onClick={() => setSkuRules(skuRules.filter(r => r.id !== rule.id))} className="text-blue-950/30 hover:text-red-500 hover:bg-red-50 p-2.5 rounded-xl transition-all"><span>🗑️</span></button></td></tr>))}
                        {skuRules.length === 0 && <tr><td colSpan="4" className="p-24 text-center text-blue-950/30 text-sm font-bold">ไม่มีข้อมูลคลังคำศัพท์</td></tr>}
                        </tbody>
                        </table>
                    </div>
                  </div>

                  <div className="bg-white border-2 border-blue-50 p-10 rounded-[2.5rem] shadow-xl shadow-blue-900/5 relative overflow-hidden">
                    <div className="relative z-10">
                      <h3 className="text-xl font-black mb-6 flex items-center gap-3 text-blue-950"><span>🧮</span> ทดสอบระบบคำนวณยอด</h3>

                          <div className="flex items-center gap-4 border-2 border-blue-100 px-5 py-3 rounded-2xl bg-blue-50/30"><span className="text-[11px] font-black text-blue-500 uppercase tracking-widest">QTY</span><input type="number" min="1" value={testQty} onChange={(e) => setTestQty(e.target.value)} className="w-16 bg-transparent outline-none text-blue-950 text-center text-xl font-black" /></div>

                      <div className="bg-blue-50/50 border-2 border-blue-100 p-8 rounded-3xl flex items-center justify-between">
                        <span className="text-blue-950/40 font-black text-[11px] uppercase tracking-widest">Result</span>
                        {testInput ? (testResult !== 'ยังไม่ตั้งชื่อ (เพิ่มกฎ SKU)' && testResult !== 'ไม่พบคีย์เวิร์ด' ? (<div className="flex items-center gap-4"><span className="text-4xl font-black text-blue-950 tracking-tight">{testResult}</span></div>) : (<div className="flex items-center gap-2"><span className="text-sm font-bold text-red-500 bg-red-50 px-4 py-2 rounded-xl">ไม่พบคีย์เวิร์ด</span></div>)) : <span className="text-4xl font-black text-blue-950/10">-</span>}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'preview' && (
                <div className="p-12 max-w-[1400px] mx-auto animate-in fade-in slide-in-from-bottom-8 duration-500">
                  <div className="flex flex-col xl:flex-row justify-between items-center mb-12 gap-8">

                    <div className="flex flex-wrap justify-center items-center gap-4">
                        
                       <div onClick={() => setThermalMode(!thermalMode)} className="cursor-pointer bg-white border-2 border-blue-50 hover:border-blue-100 p-1.5 rounded-2xl flex items-center gap-3 shadow-sm transition-all mr-2 select-none active:scale-95">

                               <span className={`text-[10px] font-bold leading-none ${thermalMode ? 'text-green-600' : 'text-blue-950/40'}`}>{thermalMode ? 'ON (แก้โลโก้หาย)' : 'OFF (สีต้นฉบับ)'}</span>

                         <button onClick={() => setPreviewMode('table')} className={`px-6 py-2.5 rounded-[12px] font-bold text-sm transition-all ${previewMode === 'table' ? 'bg-blue-50 text-blue-900 shadow-sm border border-blue-100' : 'text-blue-950/50 hover:text-blue-900 border border-transparent'}`}>ตารางสรุป</button>
                         <button onClick={() => setPreviewMode('labels')} className={`px-6 py-2.5 rounded-[12px] font-bold text-sm transition-all ${previewMode === 'labels' ? 'bg-blue-50 text-blue-900 shadow-sm border border-blue-100' : 'text-blue-950/50 hover:text-blue-900 border border-transparent'}`}>ใบปะหน้า</button>

                              <td className="px-10 py-6 font-mono text-[15px] font-bold text-blue-950/60">{order.tracking}</td>
                              <td className="px-10 py-6 text-center font-black text-2xl text-blue-950/40">
                                {order.originalQty > 0 ? `x${order.originalQty}` : '-'}
                              </td>
                              <td className="px-10 py-6">
                                <div className="flex flex-col gap-2 items-start">
                                  {order.displayItems && order.displayItems.length > 0 ? (
                                    order.displayItems.map((text, idx) => (
                                      <span key={idx} className={`font-black text-xl px-4 py-1.5 rounded-xl inline-block ${text.includes('ยังไม่ตั้งชื่อ') ? 'text-red-500 bg-red-50' : 'text-blue-900 bg-blue-100/50'}`}>
                                        {text}
                                      </span>
                                    ))
                                  ) : (
                                    <span className="text-blue-950/30 font-bold text-sm">(หน้าต่อท้ายบิล)</span>
                                  )}
                                </div>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10 justify-items-center pb-20 no-print">
                      {MappedOrders.map((order) => (<div key={`prev-${order.id}`} className="transform hover:scale-[1.01] transition-transform duration-200"><LabelCard order={order} thermalMode={thermalMode} /></div>))}
                    </div>
                  )}
                </div>
              )}
            </main>
          </div>

          <div className="fixed pointer-events-none" style={{ top: 0, left: '-9999px', width: '100mm', zIndex: -100 }}>
            {MappedOrders.map((order) => (
              <div key={`render-arena-${order.id}`} id={`render-target-${order.id}`} style={{ position: 'relative', width: '100mm', height: '150mm', backgroundColor: 'white' }}>
                <LabelCard order={order} thermalMode={thermalMode} isExport={true} />
              </div>
            ))}
          </div>
          <div className="hidden print-area w-full text-black">
            {MappedOrders.map((order) => (<LabelCard key={`print-${order.id}`} order={order} thermalMode={thermalMode} isExport={true} />))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
